<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Problem Note — Avalon Technologies</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #21262d; --surface3: #2d333b;
      --border: #30363d; --border2: #444c56; --accent: #f0a500; --accent2: #e8890c;
      --accent-dim: rgba(240,165,0,0.12); --accent-glow: rgba(240,165,0,0.25);
      --red: #f85149; --green: #3fb950; --blue: #58a6ff;
      --text: #e6edf3; --text2: #8b949e; --text3: #484f58;
      --open-bg: rgba(248,81,73,0.15); --open-text: #ff7b72;
      --close-bg: rgba(63,185,80,0.15); --close-text: #56d364;
      --radius: 8px; --radius-lg: 12px; --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }
    /* LOGIN */
    .login-page { min-height:100vh; display:flex; align-items:center; justify-content:center; background: radial-gradient(ellipse 80% 60% at 50% 0%,rgba(240,165,0,0.08) 0%,transparent 70%),var(--bg); position:relative; overflow:hidden; }
    .login-grid { position:absolute; inset:0; opacity:0.04; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:40px 40px; }
    .login-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:48px 40px; width:100%; max-width:420px; position:relative; z-index:1; box-shadow:0 0 0 1px rgba(240,165,0,0.08),0 32px 64px rgba(0,0,0,0.5); animation:fadeUp 0.5s ease both; }
    .login-badge { width:56px; height:56px; background:var(--accent); border-radius:14px; display:flex; align-items:center; justify-content:center; margin-bottom:24px; box-shadow:0 8px 32px var(--accent-glow); }
    .login-title { font-family:var(--font-head); font-size:26px; font-weight:800; margin-bottom:4px; }
    .login-sub { color:var(--text2); font-size:13px; margin-bottom:32px; }
    .form-group { margin-bottom:16px; }
    .form-group label { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:500; color:var(--text2); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:8px; }
    .input-wrap { position:relative; }
    .input-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text3); pointer-events:none; display:flex; }
    .form-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-family:var(--font-body); font-size:14px; padding:10px 12px 10px 38px; outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
    .form-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }
    .login-btn { width:100%; padding:12px; background:var(--accent); border:none; border-radius:var(--radius); color:#0d1117; font-family:var(--font-head); font-size:15px; font-weight:700; cursor:pointer; margin-top:8px; transition:background 0.2s,transform 0.1s,box-shadow 0.2s; box-shadow:0 4px 16px var(--accent-glow); }
    .login-btn:hover { background:var(--accent2); box-shadow:0 6px 24px var(--accent-glow); transform:translateY(-1px); }
    .login-btn:active { transform:translateY(0); }
    .login-error { background:rgba(248,81,73,0.12); border:1px solid rgba(248,81,73,0.3); border-radius:var(--radius); padding:10px 14px; font-size:13px; color:var(--red); margin-bottom:16px; display:flex; align-items:center; gap:8px; }
    /* APP */
    .app { display:flex; flex-direction:column; min-height:100vh; }
    .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:60px; position:sticky; top:0; z-index:100; }
    .topbar-brand { display:flex; align-items:center; gap:12px; }
    .brand-badge { width:32px; height:32px; background:var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .brand-name { font-family:var(--font-head); font-size:15px; font-weight:800; letter-spacing:-0.02em; }
    .brand-sub { font-size:10px; color:var(--text2); font-family:var(--font-mono); letter-spacing:0.06em; }
    .topbar-right { display:flex; align-items:center; gap:16px; }
    .user-chip { display:flex; align-items:center; gap:8px; background:var(--surface2); border:1px solid var(--border); border-radius:24px; padding:4px 12px 4px 8px; font-size:13px; color:var(--text2); }
    .user-dot { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); }
    .logout-btn { display:flex; align-items:center; gap:6px; background:none; border:1px solid var(--border); border-radius:var(--radius); color:var(--text2); font-family:var(--font-body); font-size:13px; padding:6px 12px; cursor:pointer; transition:all 0.2s; }
    .logout-btn:hover { border-color:var(--red); color:var(--red); }
    .content { flex:1; padding:24px; max-width:1600px; margin:0 auto; width:100%; }
    /* STATS */
    .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px 20px; display:flex; align-items:center; gap:14px; }
    .stat-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .stat-val { font-family:var(--font-head); font-size:24px; font-weight:800; line-height:1; }
    .stat-lbl { font-size:12px; color:var(--text2); margin-top:2px; }
    /* TOOLBAR */
    .toolbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
    .toolbar-left { display:flex; align-items:center; gap:10px; }
    .search-box { position:relative; }
    .search-box input { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-family:var(--font-body); font-size:13px; padding:8px 12px 8px 36px; width:260px; outline:none; transition:border-color 0.2s; }
    .search-box input:focus { border-color:var(--accent); }
    .search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text3); display:flex; }
    .filter-select { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-family:var(--font-body); font-size:13px; padding:8px 12px; outline:none; cursor:pointer; }
    .add-btn { display:flex; align-items:center; gap:8px; background:var(--accent); border:none; border-radius:var(--radius); color:#0d1117; font-family:var(--font-head); font-size:13px; font-weight:700; padding:9px 16px; cursor:pointer; transition:all 0.2s; box-shadow:0 2px 12px var(--accent-glow); }
    .add-btn:hover { background:var(--accent2); transform:translateY(-1px); }
    /* TABLE */
    .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow); }
    .table-scroll { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:13px; min-width:1100px; }
    thead { background:var(--surface2); border-bottom:1px solid var(--border); }
    thead th { padding:12px 14px; text-align:left; font-family:var(--font-head); font-size:11px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:0.06em; white-space:nowrap; border-right:1px solid var(--border); }
    thead th:last-child { border-right:none; }
    tbody tr { border-bottom:1px solid var(--border); transition:background 0.15s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:rgba(240,165,0,0.04); }
    td { padding:12px 14px; vertical-align:middle; color:var(--text); border-right:1px solid var(--border); }
    td:last-child { border-right:none; }
    .td-mono { font-family:var(--font-mono); font-size:12px; color:var(--accent); }
    .td-muted { color:var(--text2); font-family:var(--font-mono); font-size:12px; }
    .td-desc { max-width:180px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px 3px 8px; border-radius:20px; font-size:11px; font-weight:600; font-family:var(--font-head); letter-spacing:0.04em; }
    .badge-open { background:var(--open-bg); color:var(--open-text); }
    .badge-close { background:var(--close-bg); color:var(--close-text); }
    .badge-dot { width:6px; height:6px; border-radius:50%; background:currentColor; }
    .action-btns { display:flex; align-items:center; gap:6px; }
    .action-btn { width:30px; height:30px; border:1px solid var(--border); border-radius:6px; background:var(--surface2); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text2); transition:all 0.2s; }
    .action-btn.view-btn:hover { border-color:var(--blue); color:var(--blue); background:rgba(88,166,255,0.1); }
    .action-btn.edit-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
    .action-btn.del-btn:hover { border-color:var(--red); color:var(--red); background:rgba(248,81,73,0.1); }
    .empty-state { padding:60px 20px; text-align:center; color:var(--text2); }
    .empty-title { font-family:var(--font-head); font-size:16px; font-weight:700; margin-bottom:4px; color:var(--text); }
    /* MODAL */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); z-index:1000; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn 0.2s ease; }
    .modal { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); width:100%; max-width:700px; max-height:90vh; overflow-y:auto; box-shadow:0 32px 80px rgba(0,0,0,0.6); animation:slideUp 0.25s ease; }
    .modal-header { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:var(--surface); z-index:1; }
    .modal-title { font-family:var(--font-head); font-size:18px; font-weight:800; }
    .modal-subtitle { font-size:12px; color:var(--text2); margin-top:2px; }
    .modal-close { width:32px; height:32px; background:var(--surface2); border:1px solid var(--border); border-radius:6px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text2); transition:all 0.2s; }
    .modal-close:hover { border-color:var(--red); color:var(--red); }
    .modal-body { padding:24px; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .form-grid .span2 { grid-column:span 2; }
    .modal-field label { display:block; font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; }
    .modal-input,.modal-select,.modal-textarea { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-family:var(--font-body); font-size:13px; padding:9px 12px; outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
    .modal-input:focus,.modal-select:focus,.modal-textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }
    .modal-textarea { resize:vertical; min-height:72px; }
    .modal-select option { background:var(--surface2); }
    .req { color:var(--accent); }
    .modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }
    .btn-cancel { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); color:var(--text2); font-family:var(--font-body); font-size:13px; padding:8px 16px; cursor:pointer; transition:all 0.2s; }
    .btn-cancel:hover { border-color:var(--border2); color:var(--text); }
    .btn-save { display:flex; align-items:center; gap:6px; background:var(--accent); border:none; border-radius:var(--radius); color:#0d1117; font-family:var(--font-head); font-size:13px; font-weight:700; padding:8px 18px; cursor:pointer; transition:all 0.2s; }
    .btn-save:hover { background:var(--accent2); }
    /* VIEW */
    .view-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .view-field { padding:12px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); }
    .view-field.span2 { grid-column:span 2; }
    .view-label { font-size:10px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px; }
    .view-val { font-size:13px; color:var(--text); word-break:break-word; }
    .view-val.mono { font-family:var(--font-mono); font-size:12px; color:var(--accent); }
    /* DELETE */
    .confirm-modal { max-width:380px; }
    .confirm-body { padding:24px; text-align:center; }
    .confirm-icon { width:52px; height:52px; background:rgba(248,81,73,0.15); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; color:var(--red); }
    .confirm-title { font-family:var(--font-head); font-size:17px; font-weight:800; margin-bottom:8px; }
    .confirm-msg { font-size:13px; color:var(--text2); line-height:1.6; }
    .confirm-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; gap:10px; }
    .btn-danger { flex:1; background:var(--red); border:none; border-radius:var(--radius); color:#fff; font-family:var(--font-head); font-size:13px; font-weight:700; padding:9px; cursor:pointer; transition:opacity 0.2s; }
    .btn-danger:hover { opacity:0.85; }
    .btn-cancel2 { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); color:var(--text2); font-family:var(--font-body); font-size:13px; padding:9px; cursor:pointer; }
    /* TOAST */
    .toast-container { position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
    .toast { display:flex; align-items:center; gap:10px; padding:12px 16px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-lg); box-shadow:var(--shadow); font-size:13px; min-width:240px; animation:slideRight 0.3s ease; color:var(--text); }
    .toast-success { border-left:3px solid var(--green); }
    .toast-error { border-left:3px solid var(--red); }
    .toast-info { border-left:3px solid var(--blue); }
    /* ANIMS */
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideRight { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
    @media(max-width:768px){
      .stats-row{grid-template-columns:1fr 1fr;}
      .form-grid{grid-template-columns:1fr;}
      .form-grid .span2,.view-field.span2{grid-column:span 1;}
      .view-grid{grid-template-columns:1fr;}
      .toolbar{flex-direction:column;align-items:stretch;}
      .search-box input{width:100%;}
      .content{padding:16px;}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

const VALID_USER = "Mani@123";
const VALID_PASS = "Mani@2000";

const today = () => new Date().toISOString().split("T")[0];
const fmtDate = (d) => d ? new Date(d + "T00:00:00").toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}) : "—";

let toastId = 0;
let nextIdCounter = 4;

const SEED = [
  {id:1,sno:1,identifyDate:"2026-05-20",partNo:"EL-315011-1",partName:"Guide Rail (D)",description:"White powder residue found after black oxide treatment on inner bore surface.",responsibleName:"Mani R",targetDate:"2026-05-28",status:"Open",remarks:"Rinsing station checkup scheduled."},
  {id:2,sno:2,identifyDate:"2026-05-22",partNo:"EL-315011-2",partName:"Bracket Assy",description:"Brazing stage coating damage observed on 3 units during FQC inspection.",responsibleName:"Karthik S",targetDate:"2026-05-30",status:"Close",remarks:"Process parameter revised. Customer informed."},
  {id:3,sno:3,identifyDate:"2026-05-25",partNo:"EL-315011-3",partName:"Pin Holder",description:"Pin holes detected in brazed joint area. 5-Why analysis initiated.",responsibleName:"Mani R",targetDate:"2026-06-05",status:"Open",remarks:"Material cert verification in progress."},
];

const FIELDS = [
  {key:"identifyDate",label:"Identify Date",type:"date",req:true},
  {key:"partNo",label:"Part No",type:"text",req:true,placeholder:"e.g. EL-315011-1"},
  {key:"partName",label:"Part Name",type:"text",req:true,placeholder:"e.g. Guide Rail (D)"},
  {key:"responsibleName",label:"Responsible Name",type:"text",req:true,placeholder:"Engineer name"},
  {key:"targetDate",label:"Target Date",type:"date",req:true},
  {key:"status",label:"Status",type:"select",req:true,options:["Open","Close"]},
  {key:"description",label:"Description",type:"textarea",req:true,placeholder:"Describe the problem...",span:true},
  {key:"remarks",label:"Remarks",type:"textarea",req:false,placeholder:"Additional remarks...",span:true},
];

const SvgIcon = ({d,size=16}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    {d}
  </svg>
);

const Icons = {
  plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
  edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
  trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></>,
  eye: <><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>,
  close: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
  logout: <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
  search: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
  filter: <><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></>,
  check: <><polyline points="20 6 9 17 4 12"/></>,
  alert: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
  save: <><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>,
  user: <><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
  lock: <><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
  logo: <><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></>,
};

function Icon({name, size=16}) {
  return <SvgIcon d={Icons[name]} size={size}/>;
}

function ToastContainer({toasts}) {
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className={`toast toast-${t.type}`}>
          {t.type==="success" && <Icon name="check" size={15}/>}
          {t.type==="error" && <Icon name="alert" size={15}/>}
          {t.type==="info" && <Icon name="filter" size={15}/>}
          <span>{t.msg}</span>
        </div>
      ))}
    </div>
  );
}

function App() {
  const [authed, setAuthed] = useState(false);
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [loginErr, setLoginErr] = useState("");
  const [records, setRecords] = useState(SEED);
  const [search, setSearch] = useState("");
  const [filterStatus, setFilterStatus] = useState("All");
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({});
  const [toasts, setToasts] = useState([]);

  const addToast = (msg, type="success") => {
    const id = ++toastId;
    setToasts(p => [...p, {id, msg, type}]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3000);
  };

  const handleLogin = () => {
    if (username === VALID_USER && password === VALID_PASS) {
      setAuthed(true); setLoginErr("");
    } else {
      setLoginErr("Invalid username or password. Please try again.");
    }
  };

  const openAdd = () => { setForm({identifyDate:today(), status:"Open"}); setModal({mode:"add"}); };
  const openEdit = (r) => { setForm({...r}); setModal({mode:"edit", record:r}); };
  const openView = (r) => setModal({mode:"view", record:r});
  const openDelete = (r) => setModal({mode:"delete", record:r});
  const closeModal = () => setModal(null);

  const validate = () => {
    for (const f of FIELDS) {
      if (f.req && !form[f.key]) return `"${f.label}" is required.`;
    }
    return null;
  };

  const handleSave = () => {
    const err = validate();
    if (err) { addToast(err, "error"); return; }
    if (modal.mode === "add") {
      const id = nextIdCounter++;
      setRecords(p => [...p, {...form, id, sno:id}]);
      addToast("Problem note added successfully.");
    } else {
      setRecords(p => p.map(r => r.id===form.id ? {...form} : r));
      addToast("Record updated successfully.");
    }
    closeModal();
  };

  const handleDelete = () => {
    setRecords(p => p.filter(r => r.id !== modal.record.id));
    addToast("Record deleted.", "info");
    closeModal();
  };

  const filtered = records.filter(r => {
    const q = search.toLowerCase();
    const ms = !q || [r.partNo,r.partName,r.responsibleName,r.description].some(v=>v?.toLowerCase().includes(q));
    const mf = filterStatus==="All" || r.status===filterStatus;
    return ms && mf;
  });

  const total = records.length;
  const openCount = records.filter(r=>r.status==="Open").length;
  const closeCount = records.filter(r=>r.status==="Close").length;
  const overdueCount = records.filter(r=>r.status==="Open" && r.targetDate && r.targetDate < today()).length;

  /* ── LOGIN PAGE ── */
  if (!authed) return (
    <div className="login-page">
      <div className="login-grid"/>
      <div className="login-card">
        <div className="login-badge">
          <Icon name="logo" size={28}/>
        </div>
        <div className="login-title">Daily Problem Note</div>
        <div className="login-sub">Avalon Technologies — Quality Control System</div>
        {loginErr && <div className="login-error"><Icon name="alert" size={14}/>{loginErr}</div>}
        <div className="form-group">
          <label><Icon name="user" size={12}/>Username</label>
          <div className="input-wrap">
            <span className="input-icon"><Icon name="user" size={14}/></span>
            <input className="form-input" value={username} onChange={e=>setUsername(e.target.value)}
              placeholder="Enter username" onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
          </div>
        </div>
        <div className="form-group">
          <label><Icon name="lock" size={12}/>Password</label>
          <div className="input-wrap">
            <span className="input-icon"><Icon name="lock" size={14}/></span>
            <input className="form-input" type="password" value={password} onChange={e=>setPassword(e.target.value)}
              placeholder="Enter password" onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
          </div>
        </div>
        <button className="login-btn" onClick={handleLogin}>Sign In →</button>
      </div>
    </div>
  );

  /* ── MAIN APP ── */
  return (
    <div className="app">
      {/* TOPBAR */}
      <header className="topbar">
        <div className="topbar-brand">
          <div className="brand-badge"><Icon name="logo" size={18}/></div>
          <div>
            <div className="brand-name">Daily Problem Note</div>
            <div className="brand-sub">AVALON TECHNOLOGIES · QUALITY</div>
          </div>
        </div>
        <div className="topbar-right">
          <div className="user-chip"><div className="user-dot"/>Mani R</div>
          <button className="logout-btn" onClick={()=>{setAuthed(false);setUsername("");setPassword("");}}>
            <Icon name="logout" size={13}/>Logout
          </button>
        </div>
      </header>

      <main className="content">
        {/* STATS */}
        <div className="stats-row">
          {[
            {label:"Total Records",val:total,color:"#58a6ff",bg:"rgba(88,166,255,0.12)",icon:"filter"},
            {label:"Open Issues",val:openCount,color:"#f85149",bg:"rgba(248,81,73,0.12)",icon:"alert"},
            {label:"Closed Issues",val:closeCount,color:"#3fb950",bg:"rgba(63,185,80,0.12)",icon:"check"},
            {label:"Overdue",val:overdueCount,color:"#f0a500",bg:"rgba(240,165,0,0.12)",icon:"alert"},
          ].map(s=>(
            <div className="stat-card" key={s.label}>
              <div className="stat-icon" style={{background:s.bg,color:s.color}}><Icon name={s.icon} size={18}/></div>
              <div>
                <div className="stat-val" style={{color:s.color}}>{s.val}</div>
                <div className="stat-lbl">{s.label}</div>
              </div>
            </div>
          ))}
        </div>

        {/* TOOLBAR */}
        <div className="toolbar">
          <div className="toolbar-left">
            <div className="search-box">
              <span className="search-icon"><Icon name="search" size={14}/></span>
              <input placeholder="Search part, person, description…" value={search} onChange={e=>setSearch(e.target.value)}/>
            </div>
            <select className="filter-select" value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
              <option>All</option><option>Open</option><option>Close</option>
            </select>
          </div>
          <button className="add-btn" onClick={openAdd}><Icon name="plus" size={14}/>Add Problem Note</button>
        </div>

        {/* TABLE */}
        <div className="table-wrap">
          <div className="table-scroll">
            <table>
              <thead>
                <tr>
                  {["S.No","Identify Date","Part No","Part Name","Description","Responsible","Target Date","Status","Remarks","Actions"].map(h=>(
                    <th key={h}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.length===0 ? (
                  <tr><td colSpan={10}>
                    <div className="empty-state">
                      <div style={{fontSize:40,marginBottom:12,opacity:0.4}}>📋</div>
                      <div className="empty-title">No records found</div>
                      <div style={{fontSize:13,color:"var(--text2)"}}>Try adjusting your search or add a new problem note.</div>
                    </div>
                  </td></tr>
                ) : filtered.map(r=>(
                  <tr key={r.id}>
                    <td className="td-mono">{String(r.sno).padStart(3,"0")}</td>
                    <td className="td-muted">{fmtDate(r.identifyDate)}</td>
                    <td className="td-mono">{r.partNo}</td>
                    <td>{r.partName}</td>
                    <td className="td-desc" style={{color:"var(--text2)"}}>{r.description}</td>
                    <td>{r.responsibleName}</td>
                    <td className="td-muted" style={{color:r.status==="Open"&&r.targetDate<today()?"var(--red)":"var(--text2)"}}>{fmtDate(r.targetDate)}</td>
                    <td>
                      <span className={`badge badge-${r.status==="Open"?"open":"close"}`}>
                        <span className="badge-dot"/>{r.status}
                      </span>
                    </td>
                    <td className="td-desc" style={{color:"var(--text2)"}}>{r.remarks||"—"}</td>
                    <td>
                      <div className="action-btns">
                        <button className="action-btn view-btn" title="View" onClick={()=>openView(r)}><Icon name="eye" size={13}/></button>
                        <button className="action-btn edit-btn" title="Edit" onClick={()=>openEdit(r)}><Icon name="edit" size={13}/></button>
                        <button className="action-btn del-btn" title="Delete" onClick={()=>openDelete(r)}><Icon name="trash" size={13}/></button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
        {filtered.length>0 && (
          <div style={{marginTop:12,fontSize:12,color:"var(--text2)",textAlign:"right",fontFamily:"var(--font-mono)"}}>
            Showing {filtered.length} of {records.length} records
          </div>
        )}
      </main>

      {/* ADD / EDIT MODAL */}
      {modal && (modal.mode==="add"||modal.mode==="edit") && (
        <div className="modal-overlay" onClick={closeModal}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <div>
                <div className="modal-title">{modal.mode==="add"?"Add Problem Note":"Edit Problem Note"}</div>
                <div className="modal-subtitle">{modal.mode==="add"?"Fill in the problem details below":`Editing S.No ${modal.record?.sno}`}</div>
              </div>
              <button className="modal-close" onClick={closeModal}><Icon name="close" size={14}/></button>
            </div>
            <div className="modal-body">
              <div className="form-grid">
                {FIELDS.map(f=>(
                  <div className={`modal-field${f.span?" span2":""}`} key={f.key}>
                    <label>{f.label} {f.req&&<span className="req">*</span>}</label>
                    {f.type==="textarea"?(
                      <textarea className="modal-textarea" placeholder={f.placeholder||""} value={form[f.key]||""}
                        onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))}/>
                    ):f.type==="select"?(
                      <select className="modal-select" value={form[f.key]||""} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))}>
                        {f.options.map(o=><option key={o}>{o}</option>)}
                      </select>
                    ):(
                      <input className="modal-input" type={f.type} placeholder={f.placeholder||""} value={form[f.key]||""}
                        onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))}/>
                    )}
                  </div>
                ))}
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn-cancel" onClick={closeModal}>Cancel</button>
              <button className="btn-save" onClick={handleSave}><Icon name="save" size={13}/>{modal.mode==="add"?"Save Record":"Update Record"}</button>
            </div>
          </div>
        </div>
      )}

      {/* VIEW MODAL */}
      {modal?.mode==="view" && (
        <div className="modal-overlay" onClick={closeModal}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <div>
                <div className="modal-title">Problem Note Details</div>
                <div className="modal-subtitle">S.No {String(modal.record.sno).padStart(3,"0")} · {fmtDate(modal.record.identifyDate)}</div>
              </div>
              <button className="modal-close" onClick={closeModal}><Icon name="close" size={14}/></button>
            </div>
            <div className="modal-body">
              <div className="view-grid">
                {[
                  {label:"S.No",val:String(modal.record.sno).padStart(3,"0"),mono:true},
                  {label:"Status",badge:modal.record.status},
                  {label:"Identify Date",val:fmtDate(modal.record.identifyDate)},
                  {label:"Target Date",val:fmtDate(modal.record.targetDate)},
                  {label:"Part No",val:modal.record.partNo,mono:true},
                  {label:"Part Name",val:modal.record.partName},
                  {label:"Responsible",val:modal.record.responsibleName},
                  {label:"",val:""},
                  {label:"Description",val:modal.record.description,span:true},
                  {label:"Remarks",val:modal.record.remarks||"—",span:true},
                ].map((f,i)=>f.label===""?<div key={i}/>:(
                  <div className={`view-field${f.span?" span2":""}`} key={i}>
                    <div className="view-label">{f.label}</div>
                    {f.badge?(
                      <span className={`badge badge-${f.badge==="Open"?"open":"close"}`}>
                        <span className="badge-dot"/>{f.badge}
                      </span>
                    ):(
                      <div className={`view-val${f.mono?" mono":""}`}>{f.val}</div>
                    )}
                  </div>
                ))}
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn-cancel" onClick={closeModal}>Close</button>
              <button className="btn-save" onClick={()=>{closeModal();setTimeout(()=>openEdit(modal.record),50);}}>
                <Icon name="edit" size={13}/>Edit Record
              </button>
            </div>
          </div>
        </div>
      )}

      {/* DELETE CONFIRM */}
      {modal?.mode==="delete" && (
        <div className="modal-overlay" onClick={closeModal}>
          <div className="modal confirm-modal" onClick={e=>e.stopPropagation()}>
            <div className="confirm-body">
              <div className="confirm-icon"><Icon name="trash" size={22}/></div>
              <div className="confirm-title">Delete Record?</div>
              <div className="confirm-msg">
                You're about to delete <strong>{modal.record.partName}</strong> (S.No {String(modal.record.sno).padStart(3,"0")}).<br/>This action cannot be undone.
              </div>
            </div>
            <div className="confirm-footer">
              <button className="btn-cancel2" onClick={closeModal}>Cancel</button>
              <button className="btn-danger" onClick={handleDelete}>Yes, Delete</button>
            </div>
          </div>
        </div>
      )}

      <ToastContainer toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
